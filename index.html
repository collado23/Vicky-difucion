<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Umbanda Studio - Final Master</title>
    <style>
        body { background: #000; color: #fff; margin: 0; padding: 10px; font-family: sans-serif; }
        #canvas-final { width: 100%; height: 300px; border: 4px solid #ff00ff; border-radius: 20px; overflow: hidden; }
        #img-visual { width: 100%; height: 100%; object-fit: cover; }
        .controls { background: #1a1a1a; padding: 20px; border-radius: 20px; margin-top: 10px; }
        button { width: 100%; padding: 20px; margin-top: 10px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-play { background: #2ecc71; color: white; }
        .btn-download { background: #e74c3c; color: white; }
    </style>
</head>
<body>

<div id="canvas-final">
    <img id="img-visual" src="https://image.pollinations.ai/prompt/Exu_3D_Cinematico" style="display:block;">
</div>

<div class="controls">
    <button class="btn-play" onclick="iniciarSincronizacion()">1. INICIAR VISUALES</button>
    <button class="btn-download" onclick="exportarVideo()">2. DESCARGAR VIDEO FINAL (Exportar)</button>
</div>

<script>
    let mediaRecorder;
    let recordedChunks = [];

    // Función para exportar lo que está viendo en pantalla
    function exportarVideo() {
        const stream = document.querySelector('#canvas-final').captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

        mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) recordedChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'umbanda_masterpiece.webm';
            a.click();
            recordedChunks = [];
        };

        mediaRecorder.start();
        alert("Grabando video... presiona OK y espera 10 segundos para descargar.");
        setTimeout(() => mediaRecorder.stop(), 10000); // Graba 10 segundos
    }
    
    // ... (Mantén aquí el código anterior de sincronización de audio)
</script>
</body>
</html>
