<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Umbanda Master Studio</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; text-align: center; padding: 10px; }
        canvas { border: 4px solid #00f2ff; border-radius: 15px; background: #000; width: 100%; max-width: 500px; }
        .box { background: #151525; padding: 20px; border-radius: 15px; margin: 10px auto; max-width: 500px; }
        input { width: 100%; margin: 10px 0; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; background: #ff00ff; color: white; }
    </style>
</head>
<body>

<h1>ESTUDIO TOTAL UMBANDA</h1>
<canvas id="miCanvas" width="500" height="300"></canvas>

<div class="box">
    <input type="text" id="prompt" placeholder="Describe la entidad...">
    <button onclick="generarIA()">1. GENERAR IMAGEN</button>
    
    <input type="file" id="audioFile" accept="audio/*">
    <label>Tono (Grave/Agudo):</label>
    <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
    
    <button onclick="procesarYReproducir()" style="background:#2ecc71;">2. PROCESAR AUDIO Y MOVER</button>
    <button onclick="grabarVideo()" style="background:#e74c3c;">3. GRABAR Y DESCARGAR</button>
</div>

<script>
    const canvas = document.getElementById('miCanvas');
    const ctx = canvas.getContext('2d');
    let audioCtx, source, filter, analyser, img = new Image();

    function generarIA() {
        img.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(document.getElementById('prompt').value + ", 3D Render");
        img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    }

    async function procesarYReproducir() {
        const file = document.getElementById('audioFile').files[0];
        if (!file) return alert("Sube un audio primero");

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = await audioCtx.decodeAudioData(await file.arrayBuffer());
        
        source = audioCtx.createBufferSource();
        source.buffer = buffer;
        
        // Aplicamos el tono (Pitch)
        source.playbackRate.value = document.getElementById('pitch').value;
        
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        source.start();
        animar();
    }

    function animar() {
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const scale = 1 + (data[2] / 255) * 0.4;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, (canvas.width - canvas.width*scale)/2, (canvas.height - canvas.height*scale)/2, canvas.width*scale, canvas.height*scale);
        requestAnimationFrame(animar);
    }

    function grabarVideo() {
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob(chunks, { type: 'video/webm' }));
            a.download = 'resultado_final.webm';
            a.click();
        };
        recorder.start();
        setTimeout(() => recorder.stop(), 10000);
    }
</script>
</body>
</html>
