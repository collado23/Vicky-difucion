<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umbanda Pro Mobile</title>
<style>
    body { background: #0a0a1a; color: white; font-family: sans-serif; padding: 20px; }
    button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-size: 16px; }
    .btn-red { background: #e94560; color: white; }
    .btn-blue { background: #3498db; color: white; }
    .page { display: none; }
    .active { display: block; }
</style>
</head>
<body>

<h1>UMBANDA PRO</h1>
<div id="page-voz" class="page active">
    <h3>Pruebas de Audio</h3>
    <button class="btn-red" onclick="probarAudio()">PROBAR AUDIO</button>
    <p id="msg">Si escuchas esto, el audio funciona.</p>
</div>

<script>
    function probarAudio() {
        const msg = new SpeechSynthesisUtterance("Teste de som, Umbanda Pro funcionando");
        msg.lang = 'pt-BR';
        window.speechSynthesis.speak(msg);
        document.getElementById('msg').innerText = "Deberías haber escuchado el sonido.";
    }
</script>
</body>
</html>
