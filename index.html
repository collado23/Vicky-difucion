<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Umbanda Studio Final</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        #render-canvas { width: 100%; max-width: 500px; height: 300px; border: 3px solid #ff00ff; margin: 0 auto; background: #111; display: flex; align-items: center; justify-content: center; }
        #img-display { width: 100%; height: 100%; object-fit: cover; }
        .box { background: #222; padding: 15px; margin-top: 10px; border-radius: 10px; }
        button { width: 100%; padding: 15px; background: #ff00ff; color: white; border: none; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

<h1>ESTUDIO UMBANDA PRO</h1>

<div id="render-canvas">
    <img id="img-display" src="https://image.pollinations.ai/prompt/Exu_3D_Cinematico" alt="Visual">
</div>

<div class="box">
    <input type="file" id="audioUpload" accept="audio/*">
    <button onclick="startApp()">1. CARGAR Y SINCRONIZAR</button>
    <button onclick="recordVideo()" style="background: #e74c3c;">2. DESCARGAR VIDEO</button>
</div>

<script>
    let audioCtx, analyser, source;

    async function startApp() {
        const file = document.getElementById('audioUpload').files[0];
        if (!file) return alert("Por favor, selecciona un archivo de audio primero.");

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const arrayBuffer = await file.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

        source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        source.start();
        animate();
    }

    function animate() {
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        const bass = dataArray[2] / 255;
        document.getElementById('img-display').style.transform = `scale(${1 + bass * 0.4})`;
        requestAnimationFrame(animate);
    }

    function recordVideo() {
        const canvas = document.getElementById('render-canvas');
        const stream = canvas.captureStream(30);
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
        let chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'video_umbanda.webm'; a.click();
        };
        recorder.start();
        alert("Grabando... Espera 10 segundos.");
        setTimeout(() => recorder.stop(), 10000);
    }
</script>
</body>
</html>
