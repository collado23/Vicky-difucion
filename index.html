<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Umbanda Pro 5D - Sistema Total</title>
    <style>
        body { background: #050510; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        #visor { width: 100%; height: 250px; background: #000; border: 3px solid #ff00ff; border-radius: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #imagen-ia { width: 100%; height: 100%; object-fit: cover; }
        .controles { background: #111; padding: 15px; border-radius: 15px; margin-top: 10px; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        button { width: 100%; padding: 15px; background: #ff00ff; border: none; color: white; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        
        .movimiento-5d { animation: mov5d 15s infinite alternate ease-in-out; }
        @keyframes mov5d {
            0% { transform: scale(1) rotate(0deg); }
            50% { transform: scale(1.3) rotate(2deg); }
            100% { transform: scale(1.1) rotate(-2deg); }
        }
    </style>
</head>
<body>

<h1>UMBANDA PRO 5D</h1>

<div id="visor">
    <img id="imagen-ia" class="movimiento-5d" src="" style="display:none;">
</div>

<div class="controles">
    <textarea id="prompt" style="width:100%">Exu Caveira, fogo azul, 3D cinematográfico</textarea>
    <button onclick="gerarIA()">1. GENERAR IMAGEN 5D</button>

    <hr>
    <label>Cargar Audio:</label>
    <input type="file" id="audioFile" accept="audio/*">
    <label>Tono (Grave/Agudo):</label>
    <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
    <label>Velocidad:</label>
    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
    <button onclick="reproducirConEfectos()" style="background:#2ecc71">2. REPRODUCIR AUDIO Y VER</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioBuffer = null;

    // IA Generadora
    function gerarIA() {
        const img = document.getElementById('imagen-ia');
        const p = document.getElementById('prompt').value;
        img.src = "https://image.pollinations.ai/prompt/" + encodeURIComponent(p + ", 8k, cinematográfico") + "?seed=" + Math.random();
        img.style.display = "block";
    }

    // Carga de Audio
    document.getElementById('audioFile').onchange = async function(e) {
        const file = e.target.files[0];
        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    };

    // Reproducción Sincronizada
    function reproducirConEfectos() {
        if (!audioBuffer) return alert("Sube un archivo de audio primero");
        
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        
        // Aplicar velocidad
        source.playbackRate.value = document.getElementById('speed').value;
        
        // Aplicar Tono (Pitch) - Nota: En Web Audio, el tono y velocidad van ligados. 
        // Para separar tono sin cambiar velocidad, necesitaríamos un efecto "PitchShifter" 
        // complejo, pero este es el método robusto nativo.
        source.detune.value = (document.getElementById('pitch').value - 1) * 1200; 

        source.connect(audioCtx.destination);
        source.start();
        
        // Efecto visual: la imagen reacciona al iniciar el audio
        const img = document.getElementById('imagen-ia');
        img.style.filter = "brightness(2) contrast(1.5)";
        setTimeout(() => { img.style.filter = "brightness(1) contrast(1)"; }, 1000);
    }
</script>
</body>
</html>
