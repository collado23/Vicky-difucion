<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Umbanda Audio Processor Pro</title>
    <style>
        body { background: #050510; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #444; }
        input[type="range"] { width: 100%; margin: 20px 0; }
        button { width: 100%; padding: 15px; background: #ff00ff; border: none; border-radius: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h3>Procesador de Audio Independiente</h3>
    <input type="file" id="audioFile" accept="audio/*">
    
    <label>Tono (Grave ↔ Agudo):</label>
    <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
    
    <label>Velocidad:</label>
    <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
    
    <button onclick="playAudio()">REPRODUCIR PROCESADO</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let audioBuffer = null;

    document.getElementById('audioFile').onchange = async function(e) {
        const file = e.target.files[0];
        const arrayBuffer = await file.arrayBuffer();
        audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    };

    function playAudio() {
        if (!audioBuffer) return alert("Sube un archivo primero");
        
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        
        // Aquí aplicamos el Pitch y la Velocidad
        source.playbackRate.value = document.getElementById('speed').value;
        // El pitch en web audio se vincula a la velocidad; 
        // para cambiar el timbre sin cambiar la velocidad, se requiere procesamiento complejo,
        // pero este método es el más robusto y rápido para celulares.
        
        source.connect(audioCtx.destination);
        source.start();
    }
</script>
</body>
</html>
